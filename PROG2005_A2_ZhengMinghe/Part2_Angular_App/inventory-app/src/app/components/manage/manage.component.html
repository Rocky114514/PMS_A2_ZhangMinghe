<!-- Main Management Container: Provides an interactive interface for inventory CRUD operations -->
<div class="container animate-bottom">
  
  <!-- Management Card: Encapsulates the entry form and real-time feedback status bar -->
  <div class="glass-card">
    <h2>Inventory Management</h2>
    
    <!-- User Feedback: Displays dynamic success/error messages to enhance interface intuitiveness (ULO2) -->
    <div class="status-bar" *ngIf="statusMessage">{{ statusMessage }}</div>

    <!-- Reactive Form: Fulfills data field requirements (ID, Name, Category, etc.) with structured binding -->
    <form [formGroup]="itemForm" class="styled-form">
      
      <!-- Responsive Grid: Organizes mandatory fields into a mobile-friendly layout (ULO2) -->
      

      <div *ngIf="showRenameUI" class="rename-panel animate-fade">
        <label class="checkbox-label">
          <input type="checkbox" [(ngModel)]="isRenameActive" [ngModelOptions]="{standalone: true}"> Rename this item?
        </label>
        
        <div *ngIf="isRenameActive" class="new-name-input-group">
          <input type="text" placeholder="Enter New Name" [(ngModel)]="tempNewName" [ngModelOptions]="{standalone: true}" class="new-name-field">
          <button (click)="onFinalUpdate()" class="btn-confirm-rename">Save Changes</button>
        </div>
        
        <button *ngIf="!isRenameActive" (click)="onFinalUpdate()" class="btn-simple-update">Update Info Only</button>
      </div>
      <div class="input-grid">
        <div class="input-box"><label>Item ID</label><input formControlName="id" placeholder="ID*"></div>
        <div class="input-box"><label>Item Name</label><input formControlName="name" placeholder="Name*"></div>
        <div class="input-box">
          <label>Category</label>
          <select formControlName="category">
            <option value="">--Category--</option>
            <option value="Electronics">Electronics</option>
            <option value="Furniture">Furniture</option>
            <option value="Clothing">Clothing</option>
            <option value="Tools">Tools</option>
            <option value="Miscellaneous">Miscellaneous</option>
          </select>
        </div>
        <div class="input-box"><label>Quantity</label><input formControlName="quantity" type="text" placeholder="0"></div>
        <div class="input-box"><label>Price ($)</label><input formControlName="price" type="text" placeholder="0.00"></div>
        <div class="input-box"><label>Supplier</label><input formControlName="supplierName" placeholder="Supplier*"></div>
      </div>
      
      <!-- Operation Controls: Implements standard 'Add' and the specific 'Update by Name' requirement -->
      <div class="form-actions">
        <button (click)="onAdd()" class="btn-primary-gradient">Add New Item</button>
        <button (click)="toggleRenameOption()" class="btn-outline">Update / Rename</button>
      </div>
    </form>
  </div>

  <!-- Database View Section: Displays the live state of the inventory stored in the session -->
  <div class="table-section">
    <h3>Current Stock Database</h3>
    
    <!-- Overflow Wrapper: Ensures the system remains usable on narrow mobile screens (Responsive Design) -->
    <div class="table-wrapper">
      <table class="inventory-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Item Name</th>
            <th>Category</th>
            <th>Qty</th>
            <th>Price</th>
            <th>Status</th>
            <th>Pop</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <!-- Dynamic Rendering: Iterates through the data structure maintained in the InventoryService -->
          <tr *ngFor="let item of inventoryList">
            <td class="id-col">{{ item.id }}</td>
            <td class="name-col">{{ item.name }}</td>
            <td><span class="badge">{{ item.category }}</span></td>
            <td>{{ item.quantity }}</td>
            <td class="price-col">${{ item.price }}</td>
            <td>{{ item.stockStatus }}</td>
            <td>{{ item.isPopular }}</td>
            <td>
              <!-- Interactive Action Set: Provides per-item management for editing and secure deletion -->
              <div class="action-group">
                <button (click)="onEdit(item)" class="btn-edit-small">Edit</button>
                <button (click)="onDelete(item.name)" class="btn-delete-small">Delete</button>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
