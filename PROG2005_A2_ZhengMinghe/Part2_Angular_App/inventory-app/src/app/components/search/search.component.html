<!-- Search View: Dedicated page for item retrieval and advanced filtering requirements (Assessment Page 2) -->
<div class="container text-center">
  <h2 class="display-title">Inventory Search</h2>
  
  <!-- Interactive Search Area: Implements real-time filtering to enhance User Experience (ULO2) -->
  <div class="search-box-container">
    <!-- Two-way Binding: Synchronizes user input with the logic to provide immediate search results -->
    <input type="text" [(ngModel)]="searchQuery" (input)="onSearch()" placeholder="Search by name..." class="search-bar">
    
    <!-- Filter Controls: Provides specific options to toggle between the full database and popular items -->
    <div class="filter-group">
      <button (click)="showAll()" class="btn-filter">All</button>
      <button (click)="showPopular()" class="btn-filter highlight">Popular</button>
    </div>
  </div>

  <!-- Data Table Architecture: Presents inventory records in a comparative layout for high-density information display -->
  <div class="table-wrapper">
    <table class="inventory-table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Item Name</th>
          <th>Category</th>
          <th>Price</th>
          <th>Status</th>
          <th>Popular?</th>
        </tr>
      </thead>
      <tbody>
        <!-- Dynamic Iteration: Renders rows based on the filtered data structure maintained in the service -->
        <tr *ngFor="let item of filteredItems">
          <td>{{ item.id }}</td>
          <td class="bold">{{ item.name }}</td>
          <td>{{ item.category }}</td>
          <td class="price-col">${{ item.price }}</td>
          <td>{{ item.stockStatus }}</td>
          <td>
            <!-- Conditional Rendering: Uses visual cues (dot flag) to distinguish popular items per brief specifications -->
            <span *ngIf="item.isPopular === 'Yes'" class="pop-dot">● Popular</span>
            <span *ngIf="item.isPopular === 'No'">No</span>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<!-- Responsive Note: The table-wrapper handles overflow to ensure usability on narrow mobile screens (ULO1/ULO2) -->
