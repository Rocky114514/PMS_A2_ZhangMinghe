<!-- Main Search Container: Implements a responsive layout for the search module as per ULO2 requirements -->
<div class="container search-page animate-fade">
  
  <h2 class="display-title">Inventory Search</h2>
  
  <!-- Interactive Search Control: Utilizes two-way data binding to provide real-time inventory lookup functionality -->
  <div class="search-box-container">
    <input 
      type="text" 
      [(ngModel)]="searchQuery" 
      (input)="onSearch()" 
      placeholder="Search by name..." 
      class="search-bar"
    >
    <!-- Filter UI: Fulfills the requirement to provide specific filtering options for the user -->
    <div class="filter-group">
      <button (click)='showAll()' class="btn-filter">All Items</button>
      <button (click)='showPopular()' class="btn-filter highlight">★ Popular Items</button>
    </div>
  </div>

  <!-- Data Display Wrapper: Ensures the management system remains usable on narrow mobile screens (Responsive Design) -->
  <div class="table-wrapper">
    <table class="inventory-table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Item Name</th>
          <th>Category</th>
          <th>Price</th>
          <th>Status</th>
          <th>Popular?</th>
        </tr>
      </thead>
      <tbody>
        <!-- Dynamic Row Generation: Iterates through the filtered data structure maintained in the session -->
        <tr *ngFor="let item of filteredItems">
          <td class="id-col">{{ item.id }}</td>
          <td class="name-text">{{ item.name }}</td>
          <td><span class="badge">{{ item.category }}</span></td>
          <td class="price-text">${{ item.price }}</td>
          <td>{{ item.stockStatus }}</td>
          <td>
            <!-- Conditional Rendering: Employs visual cues to flag priority items as specified in the brief -->
            <span *ngIf="item.isPopular === 'Yes'" class="pop-dot">● Popular</span>
            <span *ngIf="item.isPopular === 'No'" class="no-pop">No</span>
          </td>
        </tr>
      </tbody>
    </table>
    
    <!-- Empty State Logic: Enhances User Experience (UX) by providing feedback when no search results are found -->
    <div *ngIf="filteredItems.length === 0" class="no-results">
      No items found in our vault.
    </div>
  </div>
</div>

<!-- Evaluation Note: This template demonstrates high-density information display while maintaining visual hierarchy. -->
