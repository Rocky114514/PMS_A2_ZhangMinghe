<div class="container text-center animate-fade">
  <h2 class="display-title">Inventory Search</h2>
  
  <div class="search-box-container">
    <input 
      type="text" 
      [(ngModel)]="searchQuery" 
      (input)="onSearch()" 
      placeholder="Search by name..." 
      class="search-bar"
    >
    <div class="filter-group">
      <button (click)="showAll()" class="btn-filter">All Items</button>
      <button (click)="showPopular()" class="btn-filter highlight">★ Popular Items</button>
    </div>
  </div>

  <div class="table-wrapper">
    <table class="inventory-table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Item Name</th>
          <th>Category</th>
          <th>Price</th>
          <th>Status</th>
          <th>Popular?</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let item of filteredItems">
          <td class="id-col">{{ item.id }}</td>
          <td class="bold-text">{{ item.name }}</td>
          <td><span class="badge">{{ item.category }}</span></td>
          <td class="price-text">${{ item.price }}</td>
          <td>{{ item.stockStatus }}</td>
          <td>
            <span *ngIf="item.isPopular === 'Yes'" class="pop-indicator">● Popular</span>
            <span *ngIf="item.isPopular === 'No'" class="no-indicator">No</span>
          </td>
        </tr>
      </tbody>
    </table>
    
    <div *ngIf="filteredItems.length === 0" class="no-results">
      No items found matching your search.
    </div>
  </div>
</div>
